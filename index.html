<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة التحكم</title>

<style>
body {
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  padding: 20px;
}

h1 {
  text-align: center;
}

.card {
  background: #1c1c1c;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 12px;
}

button {
  margin: 5px;
  padding: 6px 12px;
  background: red;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 6px;
}

button:hover {
  opacity: 0.8;
}
</style>

</head>
<body>

<h1>📚 إدارة الأبواب والمحاضرات</h1>

<div id="app"></div>

<script>
async function loadData() {
  const res = await fetch("http://localhost:3000/data");
  const data = await res.json();

  const app = document.getElementById("app");
  app.innerHTML = "";

  data.years.forEach(year => {
    year.subjects.forEach(subject => {
      subject.teachers.forEach(teacher => {

        teacher.chapters?.forEach(chapter => {

          const div = document.createElement("div");
          div.className = "card";

          div.innerHTML = `
            <h3>👨‍🏫 ${teacher.teacher_name}</h3>
            <p>📘 الباب: ${chapter.chapter_name}</p>
            <button onclick="deleteChapter(${chapter.chapter_id})">
              🗑️ حذف الباب
            </button>

            <div>
              ${chapter.lectures?.map(lec => `
                <p>
                  🎥 ${lec.lecture_name}
                  <button onclick="deleteLecture(${chapter.chapter_id}, ${lec.lecture_id})">
                    حذف المحاضرة
                  </button>
                </p>
              `).join("")}
            </div>
          `;

          app.appendChild(div);

        });

      });
    });
  });
}

async function deleteChapter(id) {
  if (!confirm("متأكد تحذف الباب؟")) return;

  await fetch("http://localhost:3000/delete-chapter", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ chapterId: id })
  });

  loadData();
}

async function deleteLecture(chapterId, lectureId) {
  if (!confirm("متأكد تحذف المحاضرة؟")) return;

  await fetch("http://localhost:3000/delete-lecture", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ chapterId, lectureId })
  });

  loadData();
}

loadData();
</script>

</body>
</html>
