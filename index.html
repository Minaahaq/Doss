<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body { font-family: Arial; background:#0f0f0f; color:white; padding:20px; }
h1 { text-align:center; }
.card { background:#1c1c1c; padding:15px; margin:10px 0; border-radius:10px; }
button { background:red; color:white; border:none; padding:5px 10px; cursor:pointer; border-radius:5px; }
.loading { text-align:center; }
</style>
</head>

<body>

<h1>📚 إدارة المحتوى</h1>
<div id="app" class="loading">Loading...</div>

<script>
async function loadData() {
  const res = await fetch("/api/data");
  const data = await res.json();

  const app = document.getElementById("app");
  app.innerHTML = "";

  data.years?.forEach(year => {
    year.subjects?.forEach(subject => {
      subject.teachers?.forEach(teacher => {
        teacher.chapters?.forEach(chapter => {

          const div = document.createElement("div");
          div.className = "card";

          div.innerHTML = `
            <h3>👨‍🏫 ${teacher.teacher_name}</h3>
            <p>📘 ${chapter.chapter_name}</p>

            <button onclick="deleteChapter(${chapter.chapter_id})">
              حذف الباب
            </button>

            <div>
              ${(chapter.lectures || []).map(lec => `
                <p>
                  🎥 ${lec.lecture_name}
                  <button onclick="deleteLecture(${chapter.chapter_id}, ${lec.lecture_id})">
                    حذف
                  </button>
                </p>
              `).join("")}
            </div>
          `;

          app.appendChild(div);
        });
      });
    });
  });
}

async function deleteChapter(id) {
  await fetch("/api/delete-chapter", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ chapterId: id })
  });

  loadData();
}

async function deleteLecture(chapterId, lectureId) {
  await fetch("/api/delete-lecture", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ chapterId, lectureId })
  });

  loadData();
}

loadData();
</script>

</body>
</html>
