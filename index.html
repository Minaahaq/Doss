<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة التحكم</title>

<style>
body {
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  padding: 20px;
}
.card {
  background: #1c1c1c;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 12px;
}
button {
  margin: 5px;
  padding: 6px 12px;
  background: red;
  color: white;
  border: none;
  cursor: pointer;
}
.loading {
  text-align: center;
}
</style>
</head>

<body>

<h1>📚 إدارة الأبواب</h1>
<div id="app" class="loading">جاري التحميل...</div>

<script>
async function loadData() {
  const app = document.getElementById("app");

  try {
    const res = await fetch("/data");
    const data = await res.json();

    app.innerHTML = "";

    data.years.forEach(year => {
      (year.subjects || []).forEach(subject => {
        (subject.teachers || []).forEach(teacher => {

          (teacher.chapters || []).forEach(chapter => {

            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
              <h3>${teacher.teacher_name}</h3>
              <p>${chapter.chapter_name}</p>

              <button onclick="deleteChapter('${chapter.chapter_id}')">
                حذف الباب
              </button>

              ${(chapter.lectures || []).map(lec => `
                <p>
                  ${lec.lecture_name}
                  <button onclick="deleteLecture('${chapter.chapter_id}', '${lec.lecture_id}')">
                    حذف
                  </button>
                </p>
              `).join("")}
            `;

            app.appendChild(div);
          });

        });
      });
    });

  } catch {
    app.innerHTML = "❌ فشل تحميل البيانات";
  }
}

async function deleteChapter(id) {
  await fetch("/delete-chapter", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ chapterId: id })
  });
  loadData();
}

async function deleteLecture(ch, lec) {
  await fetch("/delete-lecture", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ chapterId: ch, lectureId: lec })
  });
  loadData();
}

loadData();
</script>

</body>
</html>
